<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Channels</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 28 20'><path d='M27.97 3.12c-.32-1.19-1.26-2.13-2.45-2.45C23.33 0 14.34 0 14.34 0S5.36 0 3.17.67C1.98.99 1.04 1.93.72 3.12 0 5.3 0 10 0 10s0 4.7.72 6.88c.32 1.19 1.26 2.13 2.45 2.45C5.36 20 14.34 20 14.34 20s8.99 0 11.18-.67c1.19-.32 2.13-1.26 2.45-2.45C28.65 14.7 28.65 10 28.65 10s0-4.7-.68-6.88z' fill='%23FF0000'/><path d='M11.47 14.28L18.85 10l-7.38-4.28v8.56z' fill='%23FFF'/></svg>">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f0f;
      color: #f1f1f1;
      min-height: 100vh;
    }

    header {
      background: #1a1a1a;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #333;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
    }

    .header-controls {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #search-box {
      background: #272727;
      border: 1px solid #444;
      color: #f1f1f1;
      padding: 8px 14px;
      border-radius: 20px;
      font-size: 14px;
      width: 300px;
      outline: none;
    }

    #search-box:focus { border-color: #3ea6ff; }
    #search-box::placeholder { color: #888; }

    #speed-select,
    #sort-select {
      background: #272727;
      border: 1px solid #444;
      color: #f1f1f1;
      padding: 8px 12px;
      border-radius: 20px;
      font-size: 13px;
      outline: none;
      cursor: pointer;
    }

    #sign-in-btn, #sign-out-btn, #refresh-btn {
      background: #272727;
      color: #f1f1f1;
      border: 1px solid #444;
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
    }

    #sign-in-btn:hover, #sign-out-btn:hover, #refresh-btn:hover {
      background: #383838;
    }

    .back-btn {
      background: none;
      border: none;
      color: #3ea6ff;
      cursor: pointer;
      font-size: 14px;
      padding: 4px 8px;
      margin-right: 12px;
    }

    .back-btn:hover { text-decoration: underline; }

    /* Channel list view */
    #channel-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 16px;
      padding: 24px;
    }

    .channel-card {
      background: #1a1a1a;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: background 0.2s;
    }

    .channel-card:hover { background: #252525; }

    .channel-card-thumb {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      display: block;
    }

    .channel-card-info {
      padding: 12px;
      display: flex;
      gap: 10px;
    }

    .channel-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .channel-card-text { flex: 1; min-width: 0; }

    .channel-card-title {
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .channel-card-video {
      font-size: 12px;
      color: #aaa;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .channel-card-date {
      font-size: 11px;
      color: #717171;
      margin-top: 2px;
    }

    /* Channel detail view */
    #channel-detail { display: none; padding: 0; }

    #player-container {
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 24px 0;
    }

    #player-wrapper {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
    }

    #player-wrapper iframe, #player-wrapper div {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    #now-playing-info {
      max-width: 900px;
      margin: 12px auto 0;
      padding: 0 24px;
    }

    .now-playing-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #now-playing-title {
      font-size: 16px;
      font-weight: 500;
      flex: 1;
      min-width: 0;
    }

    .video-link {
      color: #3ea6ff;
      text-decoration: none;
      font-size: 12px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .video-link:hover { text-decoration: underline; }

    .copy-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      flex-shrink: 0;
      color: #aaa;
      font-size: 16px;
    }

    .copy-btn:hover { color: #f1f1f1; }

    .copy-btn.copied { color: #4caf50; }

    #now-playing-date {
      margin-top: 4px;
      font-size: 13px;
      color: #aaa;
    }

    #video-list-container {
      max-width: 900px;
      margin: 20px auto;
      padding: 0 24px 24px;
    }

    #video-list-container h3 {
      font-size: 14px;
      color: #aaa;
      margin-bottom: 12px;
      font-weight: 400;
    }

    .video-scroll {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding-bottom: 12px;
      scroll-behavior: smooth;
    }

    .video-scroll::-webkit-scrollbar { height: 6px; }
    .video-scroll::-webkit-scrollbar-track { background: transparent; }
    .video-scroll::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }

    .scroll-controls {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
      justify-content: flex-end;
    }

    .scroll-btn {
      background: #272727;
      border: 1px solid #444;
      color: #f1f1f1;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .scroll-btn:hover { background: #383838; }

    .video-card {
      flex: 0 0 200px;
      cursor: pointer;
      border-radius: 8px;
      overflow: hidden;
      transition: opacity 0.2s;
    }

    .video-card:hover { opacity: 0.8; }
    .video-card.active { outline: 2px solid #3ea6ff; }

    .video-card img {
      width: 200px;
      height: 112px;
      object-fit: cover;
      display: block;
    }

    .video-card-title {
      padding: 6px 4px;
      font-size: 12px;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .video-card-date {
      padding: 0 4px 6px;
      font-size: 11px;
      color: #717171;
    }

    /* Floating player */
    #player-container.floating #player-wrapper {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 360px;
      padding-bottom: 0;
      height: 203px;
      z-index: 200;
      box-shadow: 0 4px 20px rgba(0,0,0,0.6);
      border: 1px solid #333;
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 60px;
      color: #888;
      font-size: 16px;
    }

    /* Comments */
    #comments-container {
      max-width: 900px;
      margin: 0 auto 24px;
      padding: 0 24px;
    }

    #comments-toggle {
      background: #272727;
      border: 1px solid #444;
      color: #f1f1f1;
      padding: 10px 20px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
      width: 100%;
    }

    #comments-toggle:hover { background: #383838; }

    #comments-list {
      max-height: 600px;
      overflow-y: auto;
    }

    #comments-list::-webkit-scrollbar { width: 6px; }
    #comments-list::-webkit-scrollbar-track { background: transparent; }
    #comments-list::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }

    .comment {
      padding: 12px 0;
      border-bottom: 1px solid #272727;
    }

    .comment-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .comment-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
    }

    .comment-author {
      font-size: 13px;
      font-weight: 500;
      color: #f1f1f1;
    }

    .comment-date {
      font-size: 11px;
      color: #717171;
    }

    .comment-text {
      font-size: 13px;
      color: #ddd;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .comment-likes {
      font-size: 12px;
      color: #888;
      margin-top: 4px;
    }

    /* Status Console */
    #status-console {
      position: fixed;
      bottom: 16px;
      right: 16px;
      z-index: 300;
      font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace;
      font-size: 12px;
    }

    #status-toggle {
      background: #1a1a1a;
      border: 1px solid #333;
      color: #888;
      padding: 6px 12px;
      border-radius: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      margin-left: auto;
    }

    #status-toggle:hover { background: #252525; }

    #status-toggle .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4caf50;
    }

    #status-toggle .dot.has-errors { background: #f44336; }
    #status-toggle .dot.has-warnings { background: #ff9800; }

    #status-panel {
      display: none;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 12px;
      margin-bottom: 8px;
      width: 420px;
      max-height: 300px;
      overflow: hidden;
    }

    #status-panel.open { display: flex; flex-direction: column; }

    #status-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      border-bottom: 1px solid #333;
      color: #aaa;
      font-size: 11px;
      flex-shrink: 0;
    }

    #status-clear {
      background: none;
      border: none;
      color: #888;
      cursor: pointer;
      font-size: 11px;
      padding: 2px 6px;
    }

    #status-clear:hover { color: #f1f1f1; }

    #status-log {
      overflow-y: auto;
      padding: 8px 12px;
      flex: 1;
    }

    #status-log::-webkit-scrollbar { width: 4px; }
    #status-log::-webkit-scrollbar-track { background: transparent; }
    #status-log::-webkit-scrollbar-thumb { background: #444; border-radius: 2px; }

    .status-entry {
      padding: 3px 0;
      line-height: 1.4;
      color: #888;
      border-bottom: 1px solid #1f1f1f;
    }

    .status-entry:last-child { border-bottom: none; }
    .status-entry.error { color: #f44336; }
    .status-entry.warn { color: #ff9800; }
    .status-entry.info { color: #4caf50; }

    .status-entry .ts {
      color: #555;
      margin-right: 6px;
    }

    /* Video list toggle */
    .video-list-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 12px;
    }

    .video-list-tab {
      background: #272727;
      border: 1px solid #444;
      color: #888;
      padding: 6px 16px;
      cursor: pointer;
      font-size: 13px;
    }

    .video-list-tab:first-child { border-radius: 16px 0 0 16px; }
    .video-list-tab:last-child { border-radius: 0 16px 16px 0; border-left: none; }
    .video-list-tab:hover { background: #333; }
    .video-list-tab.active { background: #3ea6ff; color: #000; border-color: #3ea6ff; }

    .date-section {
      grid-column: 1 / -1;
      padding: 12px 0 4px;
      border-bottom: 1px solid #333;
      margin-bottom: 4px;
      cursor: pointer;
    }

    .date-section:hover .date-section-label { color: #3ea6ff; }

    .date-section-label {
      font-size: 14px;
      font-weight: 600;
      color: #aaa;
    }

    #quota-warning {
      display: none;
      background: #f44336;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 12px;
      white-space: nowrap;
    }

  </style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center">
    <button class="back-btn" id="back-btn" style="display:none">&larr; Back</button>
    <svg onclick="handleLogoClick()" style="cursor:pointer;margin-right:10px;flex-shrink:0" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 110 20" width="110" height="20"><path d="M27.97 3.12c-.32-1.19-1.26-2.13-2.45-2.45C23.33 0 14.34 0 14.34 0S5.36 0 3.17.67C1.98.99 1.04 1.93.72 3.12 0 5.3 0 10 0 10s0 4.7.72 6.88c.32 1.19 1.26 2.13 2.45 2.45C5.36 20 14.34 20 14.34 20s8.99 0 11.18-.67c1.19-.32 2.13-1.26 2.45-2.45C28.65 14.7 28.65 10 28.65 10s0-4.7-.68-6.88z" fill="#FF0000"/><path d="M11.47 14.28L18.85 10l-7.38-4.28v8.56z" fill="#FFF"/><text x="33" y="15" fill="#FFF" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="14" font-weight="600">Channels</text></svg>
    <h1 id="header-title" onclick="showChannelList()" style="display:none">YouTube Channels</h1>
    <span id="quota-warning"></span>
  </div>
  <div class="header-controls">
    <input type="text" id="search-box" placeholder="Filter or paste YouTube URL...">
    <select id="sort-select">
      <option value="alpha">A-Z</option>
      <option value="recent">Most Recent</option>
      <option value="oldest">Oldest</option>
    </select>
    <select id="speed-select">
      <option value="0.5">0.5x</option>
      <option value="0.75">0.75x</option>
      <option value="1">1x</option>
      <option value="1.25">1.25x</option>
      <option value="1.5">1.5x</option>
      <option value="1.75">1.75x</option>
      <option value="2">2x</option>
      <option value="2.5">2.5x</option>
    </select>
    <button id="refresh-btn" style="display:none" onclick="refreshSubscriptions()">Refresh</button>
    <button id="sign-in-btn" onclick="handleSignIn()">Sign In</button>
    <button id="sign-out-btn" style="display:none" onclick="handleSignOut()">Sign Out</button>
  </div>
</header>

<div id="channel-list"></div>

<div id="channel-detail">
  <div id="player-container">
    <div id="player-wrapper">
      <div id="player"></div>
    </div>
  </div>
  <div id="now-playing-info">
    <div class="now-playing-row">
      <div id="now-playing-title"></div>
      <a id="video-yt-link" class="video-link" href="#" target="_blank">YouTube</a>
      <button class="copy-btn" id="copy-url-btn" onclick="copyVideoUrl()" title="Copy YouTube URL"><svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M0 6.75C0 5.784.784 5 1.75 5h1.5a.75.75 0 010 1.5h-1.5a.25.25 0 00-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 00.25-.25v-1.5a.75.75 0 011.5 0v1.5A1.75 1.75 0 019.25 16h-7.5A1.75 1.75 0 010 14.25zM5 1.75C5 .784 5.784 0 6.75 0h7.5C15.216 0 16 .784 16 1.75v7.5A1.75 1.75 0 0114.25 11h-7.5A1.75 1.75 0 015 9.25zm1.75-.25a.25.25 0 00-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 00.25-.25v-7.5a.25.25 0 00-.25-.25z"/></svg></button>
    </div>
    <div id="now-playing-date"></div>
  </div>
  <div id="video-list-container">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <div class="video-list-tabs">
        <button class="video-list-tab active" id="tab-recent" onclick="switchVideoTab('recent')">Recent</button>
        <button class="video-list-tab" id="tab-related" onclick="switchVideoTab('related')">Related</button>
      </div>
      <div class="scroll-controls" style="margin-bottom:0">
        <button class="scroll-btn" onclick="scrollVideos(-1)">&larr;</button>
        <button class="scroll-btn" onclick="scrollVideos(1)">&rarr;</button>
      </div>
    </div>
    <div class="video-scroll" id="video-scroll"></div>
  </div>
  <div id="comments-container">
    <button id="comments-toggle" onclick="toggleComments()">Show Comments</button>
    <div id="comments-list" style="display:none"></div>
  </div>
</div>

<script src="config/config.js"></script>
<script>
  let tokenClient;
  let ytPlayer;
  let subscriptions = [];
  let currentVideos = [];
  let accessToken = null;
  let videoCache = {};       // channelId -> { videos: [], nextPageToken: '' }
  let commentCache = {};     // videoId -> { comments: [], nextPageToken: '' }
  let currentChannelId = '';
  let currentVideoId = '';
  let commentsOpen = false;
  let videoOffset = 0;
  const videosPerPage = 4;
  const prefetchThreshold = 40;
  let videoTab = 'recent'; // 'recent' or 'related'
  let relatedCache = {};   // videoId -> { videos: [], nextPageToken: '' }
  let currentSpeed = parseFloat(sessionStorage.getItem('yt_speed')) || CONFIG.defaultPlaybackSpeed;

  // Set speed dropdown to saved or config default
  document.getElementById('speed-select').value = String(currentSpeed);

  document.getElementById('speed-select').addEventListener('change', (e) => {
    currentSpeed = parseFloat(e.target.value);
    sessionStorage.setItem('yt_speed', currentSpeed);
    if (ytPlayer && ytPlayer.setPlaybackRate) {
      ytPlayer.setPlaybackRate(currentSpeed);
    }
  });


  // Google Identity Services
  function initGIS() {
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: CONFIG.clientId,
      scope: 'https://www.googleapis.com/auth/youtube.readonly',
      callback: (response) => {
        if (response.access_token) {
          accessToken = response.access_token;
          localStorage.setItem('yt_access_token', accessToken);
          onSignedIn();
        }
      },
    });

    // Check for cached token
    const cached = localStorage.getItem('yt_access_token');
    if (cached) {
      accessToken = cached;
      validateToken(cached).then(valid => {
        if (valid) onSignedIn();
        else refreshToken();
      });
    }
  }

  function refreshToken() {
    accessToken = null;
    localStorage.removeItem('yt_access_token');
    // Silent refresh — prompt: '' avoids consent screen if user previously authorized
    tokenClient.requestAccessToken({ prompt: '' });
  }

  async function validateToken(token) {
    try {
      const r = await fetch(`https://www.googleapis.com/oauth2/v1/tokeninfo?access_token=${token}`);
      return r.ok;
    } catch { return false; }
  }

  function handleSignIn() {
    tokenClient.requestAccessToken({ prompt: 'consent' });
  }

  function handleSignOut() {
    accessToken = null;
    localStorage.removeItem('yt_access_token');
    localStorage.removeItem('yt_subscriptions');
    localStorage.removeItem('yt_latest_videos');
    clearChannelCaches();
    document.getElementById('sign-in-btn').style.display = '';
    document.getElementById('sign-out-btn').style.display = 'none';
    document.getElementById('refresh-btn').style.display = 'none';
    document.getElementById('channel-list').innerHTML = '';
    document.getElementById('channel-detail').style.display = 'none';
  }

  async function onSignedIn() {
    document.getElementById('sign-in-btn').style.display = 'none';
    document.getElementById('sign-out-btn').style.display = '';
    document.getElementById('refresh-btn').style.display = '';

    const cached = localStorage.getItem('yt_subscriptions');
    if (cached) {
      subscriptions = JSON.parse(cached);
      if (subscriptions.length === 0) {
        await fetchSubscriptions();
      } else {
        renderChannelList();
        loadLatestVideos();
      }
    } else {
      await fetchSubscriptions();
    }
    handleHashRoute();
  }

  // Fetch all subscriptions (paginated)
  async function fetchSubscriptions() {
    document.getElementById('channel-list').innerHTML = '<div class="loading">Loading subscriptions...</div>';
    subscriptions = [];
    let pageToken = '';

    try {
      logStatus('Fetching subscriptions...', 'info');
      do {
        const url = `https://www.googleapis.com/youtube/v3/subscriptions?part=snippet&mine=true&maxResults=50&order=alphabetical&pageToken=${pageToken}&key=${CONFIG.apiKey}`;
        const data = await apiFetch(url, { headers: { Authorization: `Bearer ${accessToken}` } });

        if (data._error) {
          if (data.status === 401) { refreshToken(); return; }
          document.getElementById('channel-list').innerHTML = `<div class="loading">Error loading subscriptions — check console</div>`;
          return;
        }

        for (const item of data.items || []) {
          subscriptions.push({
            channelId: item.snippet.resourceId.channelId,
            title: item.snippet.title,
            avatar: item.snippet.thumbnails?.default?.url || '',
          });
        }
        pageToken = data.nextPageToken || '';
      } while (pageToken);

      logStatus(`Loaded ${subscriptions.length} subscriptions`, 'info');
      subscriptions.sort((a, b) => a.title.localeCompare(b.title));
      localStorage.setItem('yt_subscriptions', JSON.stringify(subscriptions));
      document.getElementById('sort-select').value = 'alpha';
      localStorage.setItem('yt_sort_order', 'alpha');
      renderChannelList();
      loadLatestVideos(true);
    } catch (e) {
      logStatus(`subscriptions: ${e.message}`, 'error');
      document.getElementById('channel-list').innerHTML = `<div class="loading">Error: ${e.message}</div>`;
    }
  }

  function refreshSubscriptions() {
    localStorage.removeItem('yt_subscriptions');
    localStorage.removeItem('yt_latest_videos');
    clearChannelCaches();
    videoCache = {};
    fetchSubscriptions();
  }

  function clearChannelCaches() {
    const keys = [];
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      if (key.startsWith('yt_channel_') || key.startsWith('yt_related_')) keys.push(key);
    }
    keys.forEach(k => localStorage.removeItem(k));
  }

  const LATEST_VIDEOS_TTL = 3 * 60 * 60 * 1000; // 3 hours

  function loadLatestVideos(forceRefresh = false) {
    const cached = localStorage.getItem('yt_latest_videos');
    if (cached && !forceRefresh) {
      const { timestamp, videos } = JSON.parse(cached);
      const age = Date.now() - timestamp;
      if (age < LATEST_VIDEOS_TTL) {
        const hours = (age / 3600000).toFixed(1);
        logStatus(`Using cached latest videos (${hours}h old)`, 'info');
        for (const sub of subscriptions) {
          if (videos[sub.channelId]) {
            sub.latestVideo = videos[sub.channelId];
          }
        }
        renderChannelList();
        return;
      }
      logStatus('Latest videos cache expired — refreshing', 'info');
    }
    fetchLatestVideos();
  }

  // Fetch latest video for each channel (batched)
  async function fetchLatestVideos() {
    logStatus(`Fetching latest videos for ${subscriptions.length} channels...`, 'info');
    const batchSize = 5;
    let loaded = 0;
    let errors = 0;
    for (let i = 0; i < subscriptions.length; i += batchSize) {
      const batch = subscriptions.slice(i, i + batchSize);
      await Promise.all(batch.map(async (sub) => {
        if (sub.latestVideo) { loaded++; return; }
        const uploadsId = 'UU' + sub.channelId.substring(2);
        const url = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&playlistId=${uploadsId}&maxResults=1&key=${CONFIG.apiKey}`;
        const data = await apiFetch(url);
        if (data._error) {
          errors++;
          if (data.reason === 'quotaExceeded') {
            logStatus(`Quota exceeded at ${loaded}/${subscriptions.length} channels — stopping`, 'error');
          }
          return;
        }
        if (data.items?.length) {
          const v = data.items[0].snippet;
          sub.latestVideo = {
            videoId: v.resourceId.videoId,
            title: v.title,
            thumbnail: v.thumbnails?.medium?.url || v.thumbnails?.default?.url || '',
            publishedAt: v.publishedAt,
          };
          updateChannelCard(sub);
        }
        loaded++;
      }));
      // Stop fetching if we hit quota
      if (errors > 0) break;
      // Re-render to update sort order as videos load
      if (document.getElementById('sort-select').value !== 'alpha') {
        renderChannelList();
      }
    }
    // Cache latest videos
    const videoMap = {};
    for (const sub of subscriptions) {
      if (sub.latestVideo) videoMap[sub.channelId] = sub.latestVideo;
    }
    localStorage.setItem('yt_latest_videos', JSON.stringify({ timestamp: Date.now(), videos: videoMap }));

    if (errors === 0) {
      logStatus(`Loaded latest videos for ${loaded} channels`, 'info');
    } else {
      logStatus(`Loaded ${loaded} of ${subscriptions.length} channels (${errors} errors)`, 'warn');
    }
  }

  // Render channel list
  function renderChannelList() {
    const container = document.getElementById('channel-list');
    container.innerHTML = '';

    const filter = document.getElementById('search-box').value.toLowerCase();
    const filtered = subscriptions.filter(s => s.title.toLowerCase().includes(filter));

    const sort = document.getElementById('sort-select').value;
    if (sort === 'alpha') {
      filtered.sort((a, b) => a.title.localeCompare(b.title));
    } else if (sort === 'recent') {
      filtered.sort((a, b) => {
        const da = a.latestVideo?.publishedAt || '';
        const db = b.latestVideo?.publishedAt || '';
        return db.localeCompare(da);
      });
    } else if (sort === 'oldest') {
      filtered.sort((a, b) => {
        const da = a.latestVideo?.publishedAt || '';
        const db = b.latestVideo?.publishedAt || '';
        return da.localeCompare(db);
      });
    }

    const showDateSections = sort === 'recent' || sort === 'oldest';
    let lastDateLabel = '';
    let sectionIndex = 0;

    for (const sub of filtered) {
      if (showDateSections && sub.latestVideo?.publishedAt) {
        const label = dateSectionLabel(sub.latestVideo.publishedAt);
        if (label !== lastDateLabel) {
          lastDateLabel = label;
          const section = document.createElement('div');
          section.className = 'date-section';
          section.id = `date-section-${sectionIndex}`;
          section.dataset.index = sectionIndex;
          section.innerHTML = `<span class="date-section-label">${label}</span>`;
          section.onclick = () => scrollToNextSection(parseInt(section.dataset.index));
          container.appendChild(section);
          sectionIndex++;
        }
      }

      const card = document.createElement('div');
      card.className = 'channel-card';
      card.id = `card-${sub.channelId}`;
      card.onclick = () => {
        if (CONFIG.openInBrowser) {
          const videoId = sub.latestVideo?.videoId;
          const hash = videoId
            ? `#channel=${sub.channelId}&video=${videoId}`
            : `#channel=${sub.channelId}`;
          window.open(`${location.origin}${location.pathname}${hash}`, '_blank');
        } else {
          showChannel(sub);
        }
      };
      card.innerHTML = `
        <img class="channel-card-thumb" src="${sub.latestVideo?.thumbnail || ''}" alt=""
             style="${sub.latestVideo ? '' : 'background:#272727;min-height:180px'}">
        <div class="channel-card-info">
          <img class="channel-avatar" src="${sub.avatar}" alt="">
          <div class="channel-card-text">
            <div class="channel-card-title">${sub.title}</div>
            <div class="channel-card-video">${sub.latestVideo?.title || 'Loading...'}</div>
            <div class="channel-card-date">${sub.latestVideo ? timeAgo(sub.latestVideo.publishedAt) : ''}</div>
          </div>
        </div>
      `;
      container.appendChild(card);
    }
  }

  function updateChannelCard(sub) {
    const card = document.getElementById(`card-${sub.channelId}`);
    if (!card) return;
    const thumb = card.querySelector('.channel-card-thumb');
    const videoTitle = card.querySelector('.channel-card-video');
    const date = card.querySelector('.channel-card-date');
    if (sub.latestVideo) {
      thumb.src = sub.latestVideo.thumbnail;
      videoTitle.textContent = sub.latestVideo.title;
      date.textContent = timeAgo(sub.latestVideo.publishedAt);
    }
  }

  // Show channel detail
  async function showChannel(sub, targetVideoId) {
    document.getElementById('channel-list').style.display = 'none';
    document.getElementById('channel-detail').style.display = 'block';
    document.getElementById('back-btn').style.display = '';
    document.getElementById('header-title').textContent = sub.title;
    document.getElementById('video-scroll').innerHTML = '<div class="loading">Loading videos...</div>';
    document.getElementById('now-playing-title').textContent = '';
    document.getElementById('now-playing-date').textContent = '';
    videoTab = 'recent';
    document.getElementById('tab-recent').classList.add('active');
    document.getElementById('tab-related').classList.remove('active');

    try {
      currentChannelId = sub.channelId;
      videoOffset = 0;

      if (!videoCache[currentChannelId]) {
        const stored = loadChannelCache(currentChannelId);
        if (stored) {
          videoCache[currentChannelId] = stored;
          logStatus(`Using cached videos for ${sub.title}`, 'info');
        } else {
          videoCache[currentChannelId] = { videos: [], nextPageToken: '' };
          await fetchChannelVideos(currentChannelId);
        }
      }

      currentVideos = videoCache[currentChannelId].videos;
      renderVideoPage();

      const target = targetVideoId
        ? currentVideos.find(v => v.videoId === targetVideoId)
        : currentVideos[0];
      if (target) playVideo(target);
    } catch (e) {
      document.getElementById('video-scroll').innerHTML = `<div class="loading">Error: ${e.message}</div>`;
    }
  }

  async function fetchChannelVideos(channelId) {
    const cache = videoCache[channelId];
    const uploadsId = 'UU' + channelId.substring(2);
    const url = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&playlistId=${uploadsId}&maxResults=50&pageToken=${cache.nextPageToken}&key=${CONFIG.apiKey}`;
    const data = await apiFetch(url);
    if (data._error) return;
    const newVideos = (data.items || []).map(item => ({
      videoId: item.snippet.resourceId.videoId,
      title: item.snippet.title,
      thumbnail: item.snippet.thumbnails?.medium?.url || item.snippet.thumbnails?.default?.url || '',
      publishedAt: item.snippet.publishedAt,
    }));
    cache.videos = cache.videos.concat(newVideos);
    cache.nextPageToken = data.nextPageToken || '';
    saveChannelCache(channelId, cache);
  }

  function saveChannelCache(channelId, cache) {
    try {
      localStorage.setItem(`yt_channel_${channelId}`, JSON.stringify({
        timestamp: Date.now(),
        videos: cache.videos,
        nextPageToken: cache.nextPageToken,
      }));
    } catch {} // localStorage full — not critical
  }

  function loadChannelCache(channelId) {
    const stored = localStorage.getItem(`yt_channel_${channelId}`);
    if (!stored) return null;
    const { timestamp, videos, nextPageToken } = JSON.parse(stored);
    if (Date.now() - timestamp > LATEST_VIDEOS_TTL) {
      localStorage.removeItem(`yt_channel_${channelId}`);
      return null;
    }
    return { videos, nextPageToken };
  }

  // Related videos
  async function fetchRelatedVideos(videoId) {
    if (!relatedCache[videoId]) {
      const stored = loadRelatedCache(videoId);
      if (stored) {
        relatedCache[videoId] = stored;
        logStatus(`Using cached related videos`, 'info');
      } else {
        relatedCache[videoId] = { videos: [], nextPageToken: '' };
      }
    }
    const cache = relatedCache[videoId];
    if (cache.videos.length > 0 && !cache.nextPageToken) return; // fully loaded, no more pages
    if (cache.videos.length > 0 && cache.nextPageToken === '') return;

    // Get current video title to use as search query
    let query = '';
    const channelVideos = videoCache[currentChannelId]?.videos || [];
    const currentVid = channelVideos.find(v => v.videoId === videoId);
    if (currentVid) {
      query = currentVid.title;
    } else {
      query = document.getElementById('now-playing-title').textContent;
    }
    // Use first few meaningful words as search terms
    query = query.replace(/[^\w\s]/g, ' ').split(/\s+/).filter(w => w.length > 2).slice(0, 4).join(' ');
    if (!query) {
      logStatus('No video title available for related search', 'warn');
      return;
    }

    const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(query)}&type=video&maxResults=50&pageToken=${cache.nextPageToken}&key=${CONFIG.apiKey}`;
    const data = await apiFetch(url);
    if (data._error) return;
    const newVideos = (data.items || []).filter(item => item.snippet && item.id.videoId !== videoId).map(item => ({
      videoId: item.id.videoId,
      title: item.snippet.title,
      thumbnail: item.snippet.thumbnails?.medium?.url || item.snippet.thumbnails?.default?.url || '',
      publishedAt: item.snippet.publishedAt,
    }));
    cache.videos = cache.videos.concat(newVideos);
    cache.nextPageToken = data.nextPageToken || '';
    saveRelatedCache(videoId, cache);
  }

  function saveRelatedCache(videoId, cache) {
    try {
      localStorage.setItem(`yt_related_${videoId}`, JSON.stringify({
        timestamp: Date.now(),
        videos: cache.videos,
        nextPageToken: cache.nextPageToken,
      }));
    } catch {}
  }

  function loadRelatedCache(videoId) {
    const stored = localStorage.getItem(`yt_related_${videoId}`);
    if (!stored) return null;
    const { timestamp, videos, nextPageToken } = JSON.parse(stored);
    if (Date.now() - timestamp > LATEST_VIDEOS_TTL) {
      localStorage.removeItem(`yt_related_${videoId}`);
      return null;
    }
    return { videos, nextPageToken };
  }

  async function switchVideoTab(tab) {
    videoTab = tab;
    videoOffset = 0;
    document.getElementById('tab-recent').classList.toggle('active', tab === 'recent');
    document.getElementById('tab-related').classList.toggle('active', tab === 'related');

    if (tab === 'recent') {
      currentVideos = videoCache[currentChannelId]?.videos || [];
      renderVideoPage();
    } else {
      const container = document.getElementById('video-scroll');
      if (!relatedCache[currentVideoId]?.videos.length) {
        container.innerHTML = '<div class="loading">Loading related videos...</div>';
        await fetchRelatedVideos(currentVideoId);
      }
      currentVideos = relatedCache[currentVideoId]?.videos || [];
      renderVideoPage();
    }
  }

  function checkPrefetch() {
    if (videoTab === 'related') {
      const cache = relatedCache[currentVideoId];
      if (cache && cache.nextPageToken && videoOffset + videosPerPage >= cache.videos.length - 10) {
        fetchRelatedVideos(currentVideoId).then(() => {
          currentVideos = cache.videos;
        });
      }
      return;
    }
    const cache = videoCache[currentChannelId];
    if (cache && cache.nextPageToken && videoOffset + videosPerPage >= cache.videos.length - 10) {
      fetchChannelVideos(currentChannelId).then(() => {
        currentVideos = cache.videos;
      });
    }
  }

  function renderVideoPage() {
    const container = document.getElementById('video-scroll');
    container.innerHTML = '';

    const searchTerm = document.getElementById('search-box').value.toLowerCase();
    const filtered = searchTerm
      ? currentVideos.filter(v => v.title.toLowerCase().includes(searchTerm))
      : currentVideos;

    const page = searchTerm ? filtered : filtered.slice(videoOffset, videoOffset + videosPerPage);

    for (const video of page) {
      const card = document.createElement('div');
      card.className = 'video-card';
      card.id = `video-${video.videoId}`;
      card.onclick = () => playVideo(video);
      card.innerHTML = `
        <img src="${video.thumbnail}" alt="">
        <div class="video-card-title">${video.title}</div>
        <div class="video-card-date">${timeAgo(video.publishedAt)}</div>
      `;
      container.appendChild(card);
    }

    checkPrefetch();
  }

  function playVideo(video) {
    document.querySelectorAll('.video-card').forEach(c => c.classList.remove('active'));
    const card = document.getElementById(`video-${video.videoId}`);
    if (card) card.classList.add('active');

    const prevVideoId = currentVideoId;
    currentVideoId = video.videoId;
    history.replaceState(null, '', `#channel=${currentChannelId}&video=${video.videoId}`);
    resetComments();
    // If on related tab and video changed, refresh related list
    if (videoTab === 'related' && prevVideoId !== video.videoId) {
      switchVideoTab('related');
    }
    document.getElementById('now-playing-title').textContent = video.title;
    document.getElementById('video-yt-link').href = `https://www.youtube.com/watch?v=${video.videoId}`;
    document.getElementById('now-playing-date').textContent = formatDate(video.publishedAt);

    if (ytPlayer && ytPlayer.loadVideoById) {
      ytPlayer.loadVideoById(video.videoId);
    } else {
      ytPlayer = new YT.Player('player', {
        videoId: video.videoId,
        playerVars: {
          autoplay: 1,
          modestbranding: 1,
          rel: 0,
        },
        events: {
          onReady: (e) => {
            e.target.setPlaybackRate(currentSpeed);
          },
          onStateChange: (e) => {
            if (e.data === YT.PlayerState.PLAYING) {
              e.target.setPlaybackRate(currentSpeed);
            }
          },
          onError: (e) => {
            showEmbedError(video.videoId);
          },
        },
      });
    }
  }

  function copyVideoUrl() {
    const url = `https://www.youtube.com/watch?v=${currentVideoId}`;
    navigator.clipboard.writeText(url).then(() => {
      const btn = document.getElementById('copy-url-btn');
      btn.classList.add('copied');
      btn.innerHTML = '&#10003;';
      setTimeout(() => {
        btn.classList.remove('copied');
        btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M0 6.75C0 5.784.784 5 1.75 5h1.5a.75.75 0 010 1.5h-1.5a.25.25 0 00-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 00.25-.25v-1.5a.75.75 0 011.5 0v1.5A1.75 1.75 0 019.25 16h-7.5A1.75 1.75 0 010 14.25zM5 1.75C5 .784 5.784 0 6.75 0h7.5C15.216 0 16 .784 16 1.75v7.5A1.75 1.75 0 0114.25 11h-7.5A1.75 1.75 0 015 9.25zm1.75-.25a.25.25 0 00-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 00.25-.25v-7.5a.25.25 0 00-.25-.25z"/></svg>';
      }, 1500);
    });
  }

  function showEmbedError(videoId) {
    const wrapper = document.getElementById('player-wrapper');
    wrapper.innerHTML = `
      <div style="position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#1a1a1a;">
        <div style="color:#aaa;margin-bottom:12px;">Embedding disabled for this video</div>
        <a href="https://www.youtube.com/watch?v=${videoId}" target="_blank"
           style="color:#3ea6ff;text-decoration:none;padding:8px 16px;border:1px solid #3ea6ff;border-radius:20px;">
          Watch on YouTube
        </a>
      </div>
      <div id="player"></div>
    `;
  }

  // Comments
  async function toggleComments() {
    const list = document.getElementById('comments-list');
    const btn = document.getElementById('comments-toggle');

    if (commentsOpen) {
      list.style.display = 'none';
      btn.textContent = 'Show Comments';
      commentsOpen = false;
      return;
    }

    commentsOpen = true;
    btn.textContent = 'Hide Comments';
    list.style.display = 'block';

    if (!commentCache[currentVideoId]) {
      commentCache[currentVideoId] = { comments: [], nextPageToken: '' };
      list.innerHTML = '<div class="loading" style="padding:20px">Loading comments...</div>';
      await fetchComments(currentVideoId);
    }
    renderComments();
  }

  async function fetchComments(videoId) {
    const cache = commentCache[videoId];
    const url = `https://www.googleapis.com/youtube/v3/commentThreads?part=snippet&videoId=${videoId}&maxResults=50&order=relevance&pageToken=${cache.nextPageToken}&key=${CONFIG.apiKey}`;
    const data = await apiFetch(url);
    if (data._error) {
      cache.disabled = true;
      return;
    }
    const newComments = (data.items || []).map(item => {
      const c = item.snippet.topLevelComment.snippet;
      return {
        author: c.authorDisplayName,
        avatar: c.authorProfileImageUrl,
        text: c.textDisplay,
        likes: c.likeCount,
        publishedAt: c.publishedAt,
      };
    });
    cache.comments = cache.comments.concat(newComments);
    cache.nextPageToken = data.nextPageToken || '';
  }

  function renderComments() {
    const list = document.getElementById('comments-list');
    const cache = commentCache[currentVideoId];

    if (!cache || cache.disabled) {
      list.innerHTML = '<div style="color:#888;padding:12px 0;font-size:13px">Comments are disabled for this video.</div>';
      return;
    }

    list.innerHTML = '';
    for (const c of cache.comments) {
      const div = document.createElement('div');
      div.className = 'comment';
      div.innerHTML = `
        <div class="comment-header">
          <img class="comment-avatar" src="${c.avatar}" alt="" onerror="this.style.background='#444';this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 28 28%22><circle cx=%2214%22 cy=%2210%22 r=%225%22 fill=%22%23888%22/><ellipse cx=%2214%22 cy=%2224%22 rx=%229%22 ry=%227%22 fill=%22%23888%22/></svg>'">
          <span class="comment-author">${c.author}</span>
          <span class="comment-date">${timeAgo(c.publishedAt)}</span>
        </div>
        <div class="comment-text">${c.text}</div>
        ${c.likes ? `<div class="comment-likes">${c.likes} like${c.likes !== 1 ? 's' : ''}</div>` : ''}
      `;
      list.appendChild(div);
    }

    if (cache.nextPageToken) {
      const loadMore = document.createElement('div');
      loadMore.style.cssText = 'text-align:center;padding:16px;';
      loadMore.innerHTML = '<button style="background:#272727;border:1px solid #444;color:#3ea6ff;padding:8px 20px;border-radius:20px;cursor:pointer;font-size:13px">Load More Comments</button>';
      loadMore.querySelector('button').onclick = async () => {
        await fetchComments(currentVideoId);
        renderComments();
      };
      list.appendChild(loadMore);
    }
  }

  function resetComments() {
    commentsOpen = false;
    document.getElementById('comments-list').style.display = 'none';
    document.getElementById('comments-list').innerHTML = '';
    document.getElementById('comments-toggle').textContent = 'Show Comments';
  }

  // Scroll-based comment prefetch
  function setupCommentScroll() {
    const list = document.getElementById('comments-list');
    list.addEventListener('scroll', () => {
      if (!commentsOpen || !currentVideoId) return;
      const cache = commentCache[currentVideoId];
      if (!cache || !cache.nextPageToken) return;
      if (list.scrollTop + list.clientHeight >= list.scrollHeight - 200) {
        fetchComments(currentVideoId).then(() => renderComments());
      }
    });
  }

  function scrollVideos(dir) {
    const maxOffset = currentVideos.length - videosPerPage;
    videoOffset = Math.max(0, Math.min(videoOffset + (dir * videosPerPage), maxOffset));
    renderVideoPage();
  }

  function showChannelList() {
    history.replaceState(null, '', location.pathname);
    document.getElementById('channel-list').style.display = '';
    document.getElementById('channel-detail').style.display = 'none';
    document.getElementById('back-btn').style.display = 'none';
    document.getElementById('header-title').textContent = 'YouTube Channels';
    document.getElementById('search-box').value = '';
    renderChannelList();

    if (ytPlayer && ytPlayer.destroy) {
      ytPlayer.destroy();
      ytPlayer = null;
      document.getElementById('player-wrapper').innerHTML = '<div id="player"></div>';
    }
  }

  async function handleHashRoute() {
    const hash = location.hash.substring(1);
    if (!hash) return;
    const params = new URLSearchParams(hash);
    const channelId = params.get('channel');
    const videoId = params.get('video');
    if (!channelId) return;

    let sub = subscriptions.find(s => s.channelId === channelId);
    if (!sub) {
      // Channel not in subscriptions — fetch channel info
      const url = `https://www.googleapis.com/youtube/v3/channels?part=snippet&id=${channelId}&key=${CONFIG.apiKey}`;
      const data = await apiFetch(url);
      if (!data._error && data.items?.length) {
        const ch = data.items[0].snippet;
        sub = {
          channelId: channelId,
          title: ch.title,
          avatar: ch.thumbnails?.default?.url || '',
        };
      }
    }
    if (sub) showChannel(sub, videoId || undefined);
  }

  window.addEventListener('hashchange', handleHashRoute);
  document.getElementById('back-btn').onclick = showChannelList;
  setupCommentScroll();

  // Floating player on scroll
  const playerObserver = new IntersectionObserver((entries) => {
    const container = document.getElementById('player-container');
    if (document.getElementById('channel-detail').style.display !== 'block') return;
    container.classList.toggle('floating', !entries[0].isIntersecting);
  }, { threshold: 0.3 });
  playerObserver.observe(document.getElementById('player-container'));

  // Sort change — persist preference
  const savedSort = localStorage.getItem('yt_sort_order');
  if (savedSort) document.getElementById('sort-select').value = savedSort;

  document.getElementById('sort-select').addEventListener('change', () => {
    localStorage.setItem('yt_sort_order', document.getElementById('sort-select').value);
    if (document.getElementById('channel-detail').style.display !== 'block') {
      renderChannelList();
    }
  });

  // YouTube URL parsing
  function parseYouTubeUrl(text) {
    const patterns = [
      /(?:youtube\.com\/watch\?.*v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/shorts\/)([a-zA-Z0-9_-]{11})/,
    ];
    for (const p of patterns) {
      const m = text.match(p);
      if (m) return m[1];
    }
    return null;
  }

  async function openVideoByUrl(videoId) {
    const url = `https://www.googleapis.com/youtube/v3/videos?part=snippet&id=${videoId}&key=${CONFIG.apiKey}`;
    const data = await apiFetch(url);
    if (data._error) return;
    if (data.items?.length) {
      const snippet = data.items[0].snippet;
      const channelId = snippet.channelId;
      let sub = subscriptions.find(s => s.channelId === channelId);
      if (!sub) {
        sub = {
          channelId: channelId,
          title: snippet.channelTitle,
          avatar: '',
        };
      }
      showChannel(sub, videoId);
    }
  }

  // Search filtering
  let searchTimeout;
  let pasteHandled = false;

  document.getElementById('search-box').addEventListener('paste', (e) => {
    pasteHandled = true;
    setTimeout(() => {
      const val = document.getElementById('search-box').value.trim();
      const videoId = parseYouTubeUrl(val);
      if (videoId) {
        document.getElementById('search-box').value = '';
        openVideoByUrl(videoId);
      }
      pasteHandled = false;
    }, 0);
  });

  document.getElementById('search-box').addEventListener('input', () => {
    if (pasteHandled) return;
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => {
      if (document.getElementById('channel-detail').style.display === 'block') {
        renderVideoPage();
      } else {
        renderChannelList();
      }
    }, 200);
  });

  // Utilities
  function handleLogoClick() {
    // If on channel detail, go back to list
    if (document.getElementById('channel-detail').style.display === 'block') {
      showChannelList();
      return;
    }
    // If on channel list with date sections, scroll to Today (first section)
    const first = document.getElementById('date-section-0');
    if (first) {
      scrollToSection(first);
    } else {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  }

  function scrollToSection(el) {
    const headerHeight = document.querySelector('header').getBoundingClientRect().bottom;
    const top = el.getBoundingClientRect().top + window.scrollY - headerHeight - 8;
    window.scrollTo({ top, behavior: 'smooth' });
  }

  function scrollToNextSection(currentIndex) {
    const next = document.getElementById(`date-section-${currentIndex + 1}`);
    if (next) scrollToSection(next);
  }

  function dateSectionLabel(dateStr) {
    const date = new Date(dateStr);
    const now = new Date();
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const yesterday = new Date(today);
    yesterday.setDate(yesterday.getDate() - 1);
    const videoDay = new Date(date.getFullYear(), date.getMonth(), date.getDate());

    if (videoDay.getTime() === today.getTime()) return 'Today';
    if (videoDay.getTime() === yesterday.getTime()) return 'Yesterday';
    return date.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
  }

  function timeAgo(dateStr) {
    const seconds = Math.floor((Date.now() - new Date(dateStr)) / 1000);
    const intervals = [
      [31536000, 'year'], [2592000, 'month'], [604800, 'week'],
      [86400, 'day'], [3600, 'hour'], [60, 'minute'],
    ];
    for (const [secs, label] of intervals) {
      const count = Math.floor(seconds / secs);
      if (count >= 1) return `${count} ${label}${count > 1 ? 's' : ''} ago`;
    }
    return 'just now';
  }

  function formatDate(dateStr) {
    return new Date(dateStr).toLocaleDateString('en-US', {
      year: 'numeric', month: 'long', day: 'numeric',
    });
  }

  // Status console
  let statusErrors = 0;
  let statusWarnings = 0;
  let statusCount = 0;

  // Quota tracking
  const QUOTA_COSTS = { search: 100, subscriptions: 1, playlistItems: 1, videos: 1, channels: 1, commentThreads: 1 };
  let quotaUsed = parseInt(localStorage.getItem('yt_quota_used') || '0');
  let quotaResetDate = localStorage.getItem('yt_quota_reset') || '';
  const QUOTA_LIMIT = 10000;

  function checkQuotaReset() {
    // Quota resets at midnight Pacific Time
    const now = new Date();
    const pacific = now.toLocaleDateString('en-US', { timeZone: 'America/Los_Angeles' });
    if (quotaResetDate !== pacific) {
      quotaUsed = 0;
      quotaResetDate = pacific;
      localStorage.setItem('yt_quota_reset', pacific);
      localStorage.setItem('yt_quota_used', '0');
      updateQuotaWarning();
    }
  }

  function trackQuota(endpoint) {
    checkQuotaReset();
    const cost = QUOTA_COSTS[endpoint] || 1;
    const prevThousand = Math.floor(quotaUsed / 1000);
    quotaUsed += cost;
    const newThousand = Math.floor(quotaUsed / 1000);
    localStorage.setItem('yt_quota_used', String(quotaUsed));

    if (newThousand > prevThousand) {
      logStatus(`Quota: ~${quotaUsed.toLocaleString()} / ${QUOTA_LIMIT.toLocaleString()} units used today`, 'warn');
    }
    updateQuotaWarning();
  }

  function updateQuotaWarning() {
    const el = document.getElementById('quota-warning');
    if (quotaUsed >= 8000) {
      el.style.display = '';
      el.textContent = `Quota: ~${quotaUsed.toLocaleString()} / ${QUOTA_LIMIT.toLocaleString()}`;
    } else {
      el.style.display = 'none';
    }
  }

  // Show warning on load if already high
  checkQuotaReset();
  updateQuotaWarning();

  function logStatus(msg, level = 'info') {
    statusCount++;
    if (level === 'error') statusErrors++;
    if (level === 'warn') statusWarnings++;

    const log = document.getElementById('status-log');
    const entry = document.createElement('div');
    entry.className = `status-entry ${level}`;
    const ts = new Date().toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
    entry.innerHTML = `<span class="ts">${ts}</span>${msg}`;
    log.appendChild(entry);
    while (log.children.length > 6) log.removeChild(log.firstChild);
    log.scrollTop = log.scrollHeight;

    updateStatusBadge();
  }

  function updateStatusBadge() {
    const dot = document.getElementById('status-dot');
    const badge = document.getElementById('status-badge');
    dot.classList.toggle('has-errors', statusErrors > 0);
    dot.classList.toggle('has-warnings', statusErrors === 0 && statusWarnings > 0);
    badge.textContent = statusErrors > 0 ? statusErrors : statusCount;
  }

  function toggleStatusPanel() {
    document.getElementById('status-panel').classList.toggle('open');
  }

  function clearStatusLog() {
    document.getElementById('status-log').innerHTML = '';
    statusErrors = 0;
    statusWarnings = 0;
    statusCount = 0;
    updateStatusBadge();
  }

  async function apiFetch(url, options = {}) {
    const endpoint = url.match(/\/youtube\/v3\/(\w+)/)?.[1] || 'api';
    trackQuota(endpoint);
    try {
      const r = await fetch(url, options);
      if (!r.ok) {
        const data = await r.json().catch(() => ({}));
        const reason = data.error?.errors?.[0]?.reason || r.statusText;
        const msg = data.error?.message || `HTTP ${r.status}`;
        if (r.status === 403 && reason === 'quotaExceeded') {
          logStatus(`${endpoint}: quota exceeded — daily limit hit`, 'error');
        } else if (r.status === 403) {
          logStatus(`${endpoint}: forbidden — ${msg}`, 'error');
        } else if (r.status === 401) {
          logStatus(`${endpoint}: auth expired`, 'warn');
        } else {
          logStatus(`${endpoint}: ${msg} (${r.status})`, 'error');
        }
        return { _error: true, status: r.status, reason, data };
      }
      const data = await r.json();
      if (data.error) {
        logStatus(`${endpoint}: ${data.error.message}`, 'error');
        return { _error: true, data };
      }
      return data;
    } catch (e) {
      logStatus(`${endpoint}: ${e.message}`, 'error');
      return { _error: true, reason: 'network', message: e.message };
    }
  }

  // Load YouTube IFrame API
  const ytScript = document.createElement('script');
  ytScript.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(ytScript);
</script>

<div id="status-console">
  <div id="status-panel">
    <div id="status-panel-header">
      <span>Channel Console</span>
      <button id="status-clear" onclick="clearStatusLog()">Clear</button>
    </div>
    <div id="status-log"></div>
  </div>
  <button id="status-toggle" onclick="toggleStatusPanel()">
    <span class="dot" id="status-dot"></span>
    <span id="status-badge">0</span>
  </button>
</div>

<!-- Google Identity Services -->
<script src="https://accounts.google.com/gsi/client" onload="initGIS()"></script>

</body>
</html>
